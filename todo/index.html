<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gabriel To-Do">
    <meta name="theme-color" content="#667eea">
    
    <title>Gabriel To-Do - Lista de Tareas</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1995/1995467.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --bg: #f7fafc;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
            --success: #48bb78;
            --danger: #f56565;
            --warning: #ed8936;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 25px;
            margin-bottom: 20px;
            animation: slideUp 0.6s ease 0.1s both;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #taskInput {
            flex: 1;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        #taskInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-add:active {
            transform: scale(0.95);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 16px;
            border: 2px solid var(--border);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            color: var(--text);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        #taskList {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }

        .task-item:hover {
            background: #f0f1f3;
            transform: translateX(5px);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-light);
        }

        .checkbox {
            width: 24px;
            height: 24px;
            accent-color: var(--success);
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            word-break: break-word;
            font-size: 1rem;
        }

        .task-priority {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .priority-high {
            background: #fed7d7;
            color: #c53030;
        }

        .priority-medium {
            background: #feebc8;
            color: #c05621;
        }

        .priority-low {
            background: #c6f6d5;
            color: #22543d;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-delete:active {
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-secondary {
            flex: 1;
            padding: 12px;
            background: var(--border);
            color: var(--text);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-secondary:active {
            transform: scale(0.95);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .priority-select {
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .priority-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }

            .card {
                padding: 16px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📝 Gabriel To-Do</h1>
        <p>Organiza tus tareas con estilo</p>
    </div>

    <div class="card">
        <div class="input-group">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Agrega una nueva tarea..." 
                autocomplete="off"
            >
            <select id="prioritySelect" class="priority-select">
                <option value="low">Baja</option>
                <option value="medium" selected>Media</option>
                <option value="high">Alta</option>
            </select>
            <button class="btn btn-add" onclick="addTask()">
                ➕ Agregar
            </button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">Hechas</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label">Pendientes</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all')">Todas</button>
            <button class="filter-btn" onclick="filterTasks('pending')">Pendientes</button>
            <button class="filter-btn" onclick="filterTasks('completed')">Completadas</button>
            <button class="filter-btn" onclick="filterTasks('high')">⚡ Altas</button>
        </div>

        <ul id="taskList"></ul>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon">🎉</div>
            <p>¡No hay tareas! Agrega una para empezar</p>
        </div>

        <div class="action-buttons">
            <button class="btn-secondary" onclick="exportTasks()">📥 Exportar</button>
            <button class="btn-secondary btn-danger" onclick="clearCompleted()">🗑️ Limpiar</button>
        </div>
    </div>
</div>

<script>
    let tasks = [];
    let currentFilter = 'all';

    // Cargar tareas al iniciar
    window.addEventListener('load', () => {
        loadTasks();
        updateStats();
        renderTasks();
        
        // Permitir agregar tarea con Enter
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    });

    function addTask() {
        const input = document.getElementById('taskInput');
        const priority = document.getElementById('prioritySelect').value;
        const text = input.value.trim();

        if (!text) {
            alert('Por favor ingresa una tarea');
            return;
        }

        if (navigator.vibrate) navigator.vibrate(20);

        const task = {
            id: Date.now(),
            text: text,
            completed: false,
            priority: priority,
            createdAt: new Date().toLocaleString()
        };

        tasks.unshift(task);
        saveTasks();
        input.value = '';
        updateStats();
        renderTasks();
    }

    function toggleTask(id) {
        tasks = tasks.map(t => 
            t.id === id ? { ...t, completed: !t.completed } : t
        );
        if (navigator.vibrate) navigator.vibrate(15);
        saveTasks();
        updateStats();
        renderTasks();
    }

    function deleteTask(id) {
        if (confirm('¿Eliminar esta tarea?')) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            updateStats();
            renderTasks();
        }
    }

    function filterTasks(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderTasks();
    }

    function renderTasks() {
        const taskList = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');
        
        let filtered = tasks;

        if (currentFilter === 'completed') {
            filtered = tasks.filter(t => t.completed);
        } else if (currentFilter === 'pending') {
            filtered = tasks.filter(t => !t.completed);
        } else if (currentFilter === 'high') {
            filtered = tasks.filter(t => t.priority === 'high' && !t.completed);
        }

        taskList.innerHTML = '';

        if (filtered.length === 0) {
            emptyState.style.display = 'block';
            return;
        }

        emptyState.style.display = 'none';

        filtered.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            li.innerHTML = `
                <input 
                    type="checkbox" 
                    class="checkbox" 
                    ${task.completed ? 'checked' : ''}
                    onchange="toggleTask(${task.id})"
                >
                <span class="task-text">${escapeHtml(task.text)}</span>
                <span class="task-priority priority-${task.priority}">${getPriorityLabel(task.priority)}</span>
                <button class="btn-delete" onclick="deleteTask(${task.id})">✕</button>
            `;
            taskList.appendChild(li);
        });
    }

    function updateStats() {
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;
        const pending = total - completed;

        document.getElementById('totalTasks').textContent = total;
        document.getElementById('completedTasks').textContent = completed;
        document.getElementById('pendingTasks').textContent = pending;
    }

    function getPriorityLabel(priority) {
        const labels = { high: 'Alta', medium: 'Media', low: 'Baja' };
        return labels[priority] || 'Media';
    }

    function saveTasks() {
        localStorage.setItem('gabrielTasks', JSON.stringify(tasks));
    }

    function loadTasks() {
        const saved = localStorage.getItem('gabrielTasks');
        tasks = saved ? JSON.parse(saved) : [];
    }

    function clearCompleted() {
        if (confirm('¿Eliminar todas las tareas completadas?')) {
            tasks = tasks.filter(t => !t.completed);
            saveTasks();
            updateStats();
            renderTasks();
        }
    }

    function exportTasks() {
        const text = tasks.map(t => 
            `[${t.completed ? '✓' : ' '}] ${t.text} (${getPriorityLabel(t.priority)})`
        ).join('\n');
        
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `tareas_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }
</script>

</body>
</html>
